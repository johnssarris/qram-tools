<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QRAM">
  <meta name="theme-color" content="#1a1a2e">
  <title>QRAM</title>
  <link rel="manifest" href="manifest.json">

  <!-- Libraries -->
  <script src="./libs/qram.js"></script>
  <script src="./libs/qram-compress.js"></script>
  <script src="./libs/qrcode.js"></script>

  <style>
    /* ── Design tokens ────────────────────────────────────────────────── */
    :root {
      --bg-deep:        #1a1a2e;  /* page background */
      --bg-mid:         #16213e;  /* card / panel background */
      --bg-dark:        #0d1117;  /* input / canvas background */
      --accent-blue:    #00d4ff;  /* primary accent */
      --accent-green:   #00ff88;  /* success / received */
    }

    /* ── Light theme overrides ─────────────────────────────────────────── */
    [data-theme="light"] {
      --bg-deep:      #f0f2f5;
      --bg-mid:       #ffffff;
      --bg-dark:      #e8ebef;
      --accent-blue:  #0094cc;
      --accent-green: #00994d;
    }

    [data-theme="light"] body { color: #222; }
    [data-theme="light"] .btn-secondary { background: #e0e3e8; color: #222; }
    [data-theme="light"] #panel-encode textarea { background: #f7f8fa; color: #006644; border-color: #ccc; }
    [data-theme="light"] .row label { color: #444; }
    [data-theme="light"] .row input[type="number"] { background: #f7f8fa; border-color: #ccc; color: #222; }
    [data-theme="light"] #drop-zone { background: #f7f8fa; border-color: #bbb; }
    [data-theme="light"] #drop-zone .drop-icon { color: #999; }
    [data-theme="light"] #drop-zone .drop-text { color: #666; }
    [data-theme="light"] #drop-zone .drop-hint { color: #999; }
    [data-theme="light"] #err { background: #fff0f0; border-color: #e0a0a0; color: #a00; }
    [data-theme="light"] #data-size { color: #666; }
    [data-theme="light"] .auto-label { color: #444; }
    [data-theme="light"] #stats { color: #666; }

    /* ── Theme toggle button ───────────────────────────────────────────── */
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 20px; }

    .theme-toggle {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid #333;
      background: var(--bg-mid);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; line-height: 1;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }

    .theme-toggle:hover { border-color: var(--accent-blue); }

    [data-theme="light"] .theme-toggle { border-color: #ccc; }
    [data-theme="light"] .theme-toggle:hover { border-color: var(--accent-blue); }

    /* Show/hide the correct icon */
    .theme-icon--light { display: none; }
    [data-theme="light"] .theme-icon--dark  { display: none; }
    [data-theme="light"] .theme-icon--light { display: inline; }

    /* ── Reset & base ─────────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-deep);
      color: #eee;
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Button styles ─────────────────────────────────────────────────── */
    .btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-bottom: 8px;
      transition: transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    /* ── Encoder styles ────────────────────────────────────────────────── */
    #panel-encode { font-family: system-ui, sans-serif; }

    #panel-encode h2 { margin: 0 0 14px 0; font-size: 1.2rem; }

    #panel-encode textarea {
      width: 100%; height: 220px;
      background: var(--bg-dark); color: #0f0;
      border: 1px solid #333; padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px; border-radius: 8px;
    }

    #start { margin-top: 12px; background: #00ff4c; color: #000; font-size: 1.05rem; }
    #start:disabled { opacity: .55; cursor: not-allowed; }

    #stop  { margin-top: 14px; background: #ff4b4b; color: #fff; font-size: 1.1rem; }

    #panel-encode canvas {
      display: block;
      width: 100%; max-width: 350px; aspect-ratio: 1;
      margin: 0 auto 4px;
      background: #fff; border-radius: 8px;
    }

    #stats {
      text-align: center; font-size: 13px; color: #b7b7b7;
      padding: 6px 0 2px; min-height: 22px;
    }

    .enc-settings { margin-top: 10px; }
    .enc-settings label { font-size: 13px; }

    #err {
      white-space: pre-wrap; background: #2a1a1a; border: 1px solid #5a2a2a;
      color: #ffd0d0; padding: 10px; border-radius: 8px; display: none;
      margin-top: 10px; font-family: ui-monospace, monospace; font-size: 12px;
    }

    .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin: 12px 0; }
    .row label { color: #c8c8c8; display: flex; gap: 6px; align-items: center; }

    .row input[type="number"] {
      width: 80px; padding: 6px 8px;
      background: var(--bg-dark); border: 1px solid #333; color: #eee; border-radius: 6px;
    }

    /* Encoder inner Text / File mode tabs */
    .mode-tabs { display: flex; gap: 0; margin-bottom: 12px; }
    .mode-tab {
      padding: 10px 24px; background: var(--bg-mid); color: #888;
      border: 1px solid #333; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all .15s;
    }
    .mode-tab:first-child { border-radius: 8px 0 0 8px; }
    .mode-tab:last-child  { border-radius: 0 8px 8px 0; }
    .mode-tab.active      { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }
    .mode-tab:not(.active):hover { background: #1e2d4a; }

    /* Drop zone */
    #drop-zone {
      width: 100%; height: 220px;
      background: var(--bg-dark); border: 2px dashed #444; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; transition: border-color .2s, background .2s;
    }
    #drop-zone.active   { border-color: var(--accent-blue); background: #0d1117cc; }
    #drop-zone.has-file { border-color: var(--accent-green); border-style: solid; }
    #drop-zone .drop-icon { font-size: 36px; color: #555; }
    #drop-zone .drop-text { color: #888; font-size: 14px; }
    #drop-zone .file-info { color: var(--accent-green); font-size: 14px; font-weight: 600; }
    #drop-zone .file-size { color: #888; font-size: 12px; }
    #drop-zone .drop-hint { color: #666; font-size: 11px; }
    #file-input { display: none; }

    #data-size { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>

<body>
  <div class="container">

    <div class="toolbar">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode">
        <span class="theme-icon theme-icon--dark">&#9790;</span>
        <span class="theme-icon theme-icon--light">&#9728;</span>
      </button>
    </div>

    <!-- ── Encoder panel ─────────────────────────────────────────────── -->
    <div id="panel-encode">

      <!-- Setup view: shown before encoding starts -->
      <div id="enc-setup">
        <h2>QRAM Encoder</h2>

        <div class="mode-tabs">
          <div class="mode-tab active" data-mode="text">Text</div>
          <div class="mode-tab" data-mode="file">File</div>
        </div>

        <div id="text-input">
          <textarea id="txt" placeholder="Paste text here..."></textarea>
        </div>

        <div id="file-input-area" style="display:none">
          <div id="drop-zone">
            <div class="drop-icon">📁</div>
            <div class="drop-text">Drop a file here or click to browse</div>
            <div class="drop-hint">SSH keys, configs, small files</div>
          </div>
          <input type="file" id="file-input" />
        </div>

        <div id="data-size"></div>

        <div class="row enc-settings">
          <label>FPS:<input type="number" id="fps" value="20" min="1" max="60"></label>
          <label>Block:<input type="number" id="blk" value="200" min="50" max="5000"></label>
        </div>

        <button id="start" class="btn">&#9654; Start Encoding</button>
      </div><!-- /#enc-setup -->

      <!-- Error box: always visible, shown between views if needed -->
      <div id="err"></div>

      <!-- Live view: shown while encoding is running -->
      <div id="enc-live" style="display:none">
        <canvas id="qr" width="350" height="350"></canvas>
        <div id="stats"></div>
        <button id="stop" class="btn">&#9632; Stop</button>
      </div><!-- /#enc-live -->

    </div><!-- /#panel-encode -->

  </div><!-- /.container -->

  <script src="./libs/app.js"></script>
</body>
</html>
